# Configuração do Netlify para Leve Vida
# Arquivo opcional mas recomendado

[build]
  # Pasta de publicação
  publish = "levevida"
  
  # Comando de build (se necessário)
  # command = "npm run build"

[build.environment]
  # Variáveis de ambiente (se necessário)
  # NODE_VERSION = "18"

# Configurações de Headers (complementa _headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/js/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/css/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects (complementa _redirects)
[[redirects]]
  from = "https://levevida.blog.br/*"
  to = "https://www.levevida.blog.br/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Plugin para otimização de imagens (opcional)
# [[plugins]]
#   package = "@netlify/plugin-nextjs"

# Plugin para cache (opcional)
# [[plugins]]
#   package = "netlify-plugin-cache"

# Configurações de contexto
[context.production]
  # Ambiente de produção
  
[context.deploy-preview]
  # Preview de deploy

[context.branch-deploy]
  # Deploy de branches
