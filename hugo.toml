# ============================================================
#  LEVE VIDA — hugo.toml
#  Última atualização: 2025
#  Deploy: Netlify | Domínio: www.levevida.blog.br
# ============================================================

baseURL       = "https://www.levevida.blog.br"
languageCode  = "pt-br"
defaultContentLanguage = "pt-br"
title         = "Leve Vida | Milhas, Viagens e Economia"
theme         = "Voe Alto, Viva Leve!"

# Minificação automática no build de produção
[build]
  writeStats = false

[minify]
  disableCSS        = false
  disableHTML       = false
  disableJS         = false
  disableJSON       = false
  disableSVG        = false
  disableXML        = false
  minifyOutput      = true

# ── Paginação ──────────────────────────────────────────────
paginate = 6

# ── Taxonomias ─────────────────────────────────────────────
[taxonomies]
  category = "categories"
  tag      = "tags"

# ── Saídas ─────────────────────────────────────────────────
[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# ── Parâmetros Globais ─────────────────────────────────────
[params]
  description  = "Aprenda estratégias reais de acúmulo de milhas para viajar mais gastando menos. E-book completo com planilhas e ferramentas práticas."
  author       = "Blog Leve Vida"
  tagline      = "Voe Alto, Viva Leve!"
  whatsapp     = "5565993317054"
  email        = "equipelevevida@gmail.com"
  analyticsID  = "G-5THEF9N1MD"

  # Redes Sociais
  instagram    = "https://instagram.com/levevida8"
  youtube      = "https://youtube.com/@levevida8"
  tiktok       = "https://tiktok.com/@levevida88"
  kwai         = "https://kwai.com/@levevida88"

  # E-book / Hotmart
  ebookURL     = "https://hotm.io/rota-das-milhas-ebook"
  ebookPrice   = "R$ 47"
  ebookCoupon  = "LEVEVIDA10"

  # SEO / Open Graph
  ogImage      = "/images/og-levevida.jpg"
  twitterCard  = "summary_large_image"

[params.social]
  facebook = ""
  twitter  = ""

# ── Markup ─────────────────────────────────────────────────
[markup]
  [markup.goldmark.renderer]
    unsafe = true          # permite HTML nos arquivos .md
  [markup.highlight]
    style = "monokai"

# ── Segurança ──────────────────────────────────────────────
[security]
  enableInlineShortcodes = false
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]
