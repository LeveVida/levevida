<!-- ========================================
     TIMER DE URGÊNCIA — com contraste WCAG AA corrigido
     Coloque este código na página de vendas do e-book
     (content/ebooks/rota-das-milhas.md)
     ======================================== -->

<div class="urgency-timer-container">
    <div class="urgency-banner">
        <div class="urgency-icon">⚡</div>
        <div class="urgency-content">
            <h3 class="urgency-title">⏰ Oferta Especial Expira em:</h3>
            <div id="countdownTimer" class="countdown-timer" aria-live="polite" aria-atomic="true">
                <div class="countdown-item">
                    <span class="countdown-value" id="hours">00</span>
                    <span class="countdown-label">Horas</span>
                </div>
                <div class="countdown-separator" aria-hidden="true">:</div>
                <div class="countdown-item">
                    <span class="countdown-value" id="minutes">00</span>
                    <span class="countdown-label">Minutos</span>
                </div>
                <div class="countdown-separator" aria-hidden="true">:</div>
                <div class="countdown-item">
                    <span class="countdown-value" id="seconds">00</span>
                    <span class="countdown-label">Segundos</span>
                </div>
            </div>
            <p class="urgency-message" id="urgencyMessage">
                Após o término, o preço volta para <strong>R$ 97,00</strong>
            </p>
        </div>
    </div>
</div>

<style>
.urgency-timer-container {
    margin: 2rem 0;
    animation: slideDown 0.6s ease-out;
}

/*
  CORREÇÃO DE CONTRASTE — falha #6:

  ANTES: gradiente #ff6b6b → #ee5a6f (vermelho claro)
    .countdown-item bg: rgba(255,255,255,0.2) composto sobre #ff6b6b
    → fundo efetivo ≈ rgb(255,137,137) → contraste branco = 2.28:1 ❌

  DEPOIS: gradiente #c0392b → #922b21 (vermelho escuro)
    .countdown-item bg: rgba(0,0,0,0.28) composto sobre #c0392b
    → fundo efetivo ≈ rgb(138,41,31) → contraste branco = 8.69:1 ✅
*/
.urgency-banner {
    background: linear-gradient(135deg, #c0392b 0%, #922b21 100%);
    color: white;
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(150, 40, 27, 0.35);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
}

.urgency-banner::before {
    content: '';
    position: absolute;
    top: -50%; right: -50%;
    width: 200%; height: 200%;
    background: repeating-linear-gradient(
        45deg, transparent, transparent 10px,
        rgba(255,255,255,0.05) 10px, rgba(255,255,255,0.05) 20px
    );
    animation: moveStripes 20s linear infinite;
    will-change: transform;
}

.urgency-icon {
    font-size: 3rem;
    animation: pulse 1.5s ease-in-out infinite;
    z-index: 1;
    will-change: transform;
}

.urgency-content { flex: 1; z-index: 1; }

.urgency-title {
    margin: 0 0 1rem 0;
    font-size: 1.5rem;
    font-weight: bold;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    color: #ffffff; /* contraste 8.69:1 ✅ */
}

.countdown-timer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    margin: 1.5rem 0;
}

/*
  CORREÇÃO PRINCIPAL — countdown-item background:
  Troca rgba(branco,0.2) por rgba(preto,0.28):
  - Fundo claro sobre vermelho claro = 2.28:1 ❌
  - Fundo escuro sobre vermelho escuro = 8.69:1 ✅
*/
.countdown-item {
    background: rgba(0, 0, 0, 0.28);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
}

.countdown-value {
    font-size: 2.5rem;
    font-weight: bold;
    line-height: 1;
    font-family: 'Courier New', monospace;
    min-width: 2ch;
    text-align: center;
    color: #ffffff; /* 8.69:1 ✅ */
}

/* CORREÇÃO: sem opacity que diluía o contraste do label */
.countdown-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 0.5rem;
    color: #ffffff; /* era opacity:0.9 → 7.82:1 ✅ (acima do 4.5 exigido) */
}

.countdown-separator {
    font-size: 2rem;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.85);
    animation: blink 1s infinite;
}

/* CORREÇÃO: sem opacity que reduzia o contraste */
.urgency-message {
    margin: 1rem 0 0 0;
    font-size: 1.1rem;
    text-align: center;
    color: #ffffff; /* era opacity:0.95 → agora explícito, 8.69:1 ✅ */
}

.urgency-message strong {
    font-size: 1.3rem;
    text-decoration: underline;
}

/* Animações — transform/opacity: sem impacto em layout */
@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
}
@keyframes pulse {
    0%, 100% { transform: scale(1);   }
    50%       { transform: scale(1.1); }
}
@keyframes blink {
    0%, 49%, 100% { opacity: 1;   }
    50%,  99%     { opacity: 0.3; }
}
@keyframes moveStripes {
    from { transform: translateX(0);     }
    to   { transform: translateX(-40px); }
}
@keyframes shake {
    0%, 100% { transform: translateX(0);   }
    25%       { transform: translateX(-5px);}
    75%       { transform: translateX(5px); }
}

/* Estado expirado */
.urgency-timer-container.expired .urgency-banner {
    background: linear-gradient(135deg, #636e72 0%, #4a5568 100%);
    box-shadow: none;
}
.urgency-timer-container.expired .countdown-timer { opacity: 0.6; }
.urgency-timer-container.is-critical { animation: shake 0.5s infinite; }

/* Responsivo */
@media (max-width: 768px) {
    .urgency-banner  { flex-direction: column; text-align: center; padding: 1.5rem; }
    .urgency-icon    { font-size: 2.5rem; }
    .urgency-title   { font-size: 1.2rem; }
    .countdown-timer { gap: 0.3rem; flex-wrap: wrap; }
    .countdown-item  { padding: 0.8rem 1rem; min-width: 70px; }
    .countdown-value { font-size: 2rem; }
    .countdown-label { font-size: 0.7rem; }
    .urgency-message { font-size: 1rem; }
}
</style>

<script>
(function () {
    'use strict';

    var timerContainer = document.querySelector('.urgency-timer-container');
    var hoursEl        = document.getElementById('hours');
    var minutesEl      = document.getElementById('minutes');
    var secondsEl      = document.getElementById('seconds');
    var urgencyMessage = document.getElementById('urgencyMessage');

    var TIMER_MODE           = 'evergreen';
    var TIMER_DURATION_HOURS = 2;
    var FIXED_END_DATE       = new Date('2026-06-01T23:59:59');

    var endTime;
    var intervalId = null;
    var isCritical = false;
    var isExpired  = false;
    var lastHours  = -1, lastMinutes = -1, lastSeconds = -1;

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function getEndTime() {
        if (TIMER_MODE === 'evergreen') {
            var saved = localStorage.getItem('urgencyTimerEnd');
            if (saved) return new Date(saved);
            var end = new Date(Date.now() + TIMER_DURATION_HOURS * 3600000);
            localStorage.setItem('urgencyTimerEnd', end.toISOString());
            return end;
        }
        return FIXED_END_DATE;
    }

    function tick() {
        var diff = endTime - Date.now();
        if (diff <= 0) {
            clearInterval(intervalId); intervalId = null;
            if (!isExpired) {
                isExpired = true;
                requestAnimationFrame(function () {
                    hoursEl.textContent = minutesEl.textContent = secondsEl.textContent = '00';
                    timerContainer.classList.add('expired');
                    timerContainer.classList.remove('is-critical');
                    urgencyMessage.innerHTML = '<strong>⚠️ Oferta expirada!</strong> O preço voltou para R$ 97,00';
                });
                if (typeof gtag !== 'undefined')
                    gtag('event', 'timer_expired', { event_category: 'urgency_timer', event_label: 'ebook_offer' });
            }
            return;
        }

        var h = Math.floor(diff / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);
        var enterCritical = (h === 0 && m < 10 && !isCritical);

        if (h === lastHours && m === lastMinutes && s === lastSeconds && !enterCritical) return;

        var uH = h !== lastHours, uM = m !== lastMinutes, uS = s !== lastSeconds;
        var hS = pad(h), mS = pad(m), sS = pad(s);
        lastHours = h; lastMinutes = m; lastSeconds = s;

        requestAnimationFrame(function () {
            if (uH) hoursEl.textContent   = hS;
            if (uM) minutesEl.textContent = mS;
            if (uS) secondsEl.textContent = sS;
            if (enterCritical) {
                isCritical = true;
                timerContainer.classList.add('is-critical');
                urgencyMessage.innerHTML = '<strong>🔥 ÚLTIMOS MINUTOS!</strong> Não perca esta oportunidade!';
            }
        });
    }

    endTime    = getEndTime();
    tick();
    intervalId = setInterval(tick, 1000);
}());
</script>

<!-- Para resetar (testes): localStorage.removeItem('urgencyTimerEnd'); location.reload(); -->
